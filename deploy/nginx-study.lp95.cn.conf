server {
    server_name study.lp95.cn;

    client_max_body_size 30m;

    location / {
        proxy_pass http://127.0.0.1:8610;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/study.lp95.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/study.lp95.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = study.lp95.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name study.lp95.cn;
    return 404; # managed by Certbot
}
